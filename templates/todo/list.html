{% extends "base.html" %}
{% load static %}
{% block content %}

<!-- Todo 목록이 출력될 영역 (JS DOM 생성용) -->
<div class="todocontainer"></div>

<!-- 페이지네이션 영역 -->
<div class="pagination">
    <button id="prevBtn">이전</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">다음</button>
</div>

<!-- 페이지 크기 선택 -->
<input id="pageSizeInput" type="number" min="1" max="20" value="3" />
<button id="pageSizeBtn">적용</button>

<button id="createBtn">Todo 등록하기</button>

{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const LOGIN_PAGE_URL = "/login/";
        let currentPage = 1;
        let currentPageSize = 3;  // 기본값

        if (!window.api) { // window.api 존재 확인
            console.error("window.api가 없습니다. base.html에서 static/js/api.js가 로드됐는지 확인하세요.");
            alert("설정 오류: api.js가 로드되지 않았습니다.");
            return;
        }

        // 이 로직은 이해가 안됨, JWT access 토큰이 없으면 바로 로그인??
        const access = localStorage.getItem(ACCESS_KEY);
        if (!access) {
            console.log("access_token 없음 → 로그인 이동");
            window.location.href = LOGIN_PAGE_URL;
            return;
        }

        // ✅ [추가됨] 401/403 처리 로직을 함수로 분리 (기존 interceptor 대체)
        // ✅ 응답에서 401/403이면 로그인으로 (3단계용: refresh 자동화는 5단계에서)
        function handleAuthError(err) {
            const status = err.response?.status;
            if (status === 401 || status === 403) {
                console.log("인증 실패(401/403) → 토큰 삭제 후 로그인 이동");

                // ✅ [추가됨] 토큰 정리(선택)
                localStorage.removeItem("ACCESS_KEY");
                localStorage.removeItem("REFRESH_KEY");

                window.location.href = LOGIN_PAGE_URL;
            }
            return Promise.reject(err);
        }

        /* 수정버전, 사용자가 페이지네이션 갯수 설정가능*/
        function loadPage(page) {
            // 기존의 코드와 비교시, 주소 변경된 것을 확인가능.
            api.get(`/todo/viewsets/view/?page=${page}&page_size=${currentPageSize}`)
                .then(res => {
                    const data = res.data;
                    renderTodos(data.data || data.results || []);   // Todo 목록 렌더링
                    updatePaginationUI(data);
                    currentPage = data.current_page || page;
                })
                .catch(err => {
                    // 인증 오류면 handleAuthError로 로그인 이동 처리
                    handleAuthError(err).catch(() => {}); // 인증 실패 처리
                    console.error("페이지 로드 실패", err.response?.data || err.message); // 로그 더 자세히
                });
        }

        /* Todo 목록을 HTML에 렌더링하는 함수 */
        function renderTodos(todos) {
            const container = document.querySelector(".todocontainer");
            container.innerHTML = "";

            // Todo가 없는 경우 메시지 출력
            if (!todos || todos.length === 0) {
                container.innerHTML = "<p>등록된 Todo 없음</p>";
            return;
        }

            /* Todo 데이터를 반복하면서 화면에 출력 */
            todos.forEach(todo => {
                const div = document.createElement("div");
                div.className = "todo-item";
                div.dataset.id = todo.id;
                // 이미지 경로 처리
                const imageSrc = todo.image
                    ? (todo.image.startsWith("http") ? todo.image : `${location.origin}${todo.image}`)
                    : "";
                div.innerHTML = `
                    <p><strong>이름:</strong> ${todo.name}</p>
                    <p><strong>설명:</strong> ${todo.description}</p>
                    <p><strong>완료 여부:</strong> ${todo.complete}</p>
                    <p><strong>exp:</strong> ${todo.exp}</p>
                    <!-- [Part 6] 이미지 표시 -->
                    ${imageSrc ? `<img src="${imageSrc}" style="max-width:200px;">` : "<p>이미지 없음</p>"}
                    <hr>
                `;
                div.addEventListener("click", () => {
                    window.location.href = `/todo/detail/${todo.id}/`;
                });
                container.appendChild(div);
            });
        }

        /* 페이지네이션 UI 업데이트 */
        function updatePaginationUI(data) {
            // 현재 페이지
            const current = data.current_page ?? currentPage ?? 1;

            // 전체 페이지 계산
            const total =
                data.page_count ??
                (typeof data.count === "number" && data.results
                    ? Math.ceil(data.count / data.results.length)
                    : "?");

            document.getElementById("pageInfo").innerText =
                `${data.current_page} / ${data.page_count}`;
            document.getElementById("prevBtn").disabled = !data.previous;
            document.getElementById("nextBtn").disabled = !data.next;
        }

        /* 이전 페이지 버튼 클릭 이벤트 */
        document.getElementById("prevBtn").addEventListener("click", () => {
            if (currentPage > 1) loadPage(currentPage - 1);
        });

        /* 다음 페이지 버튼 클릭 이벤트 */
        document.getElementById("nextBtn").addEventListener("click", () => {
            loadPage(currentPage + 1);
        });

        /* Todo 생성 페이지 이동 */
        document.getElementById("createBtn").addEventListener("click", () => {
            window.location.href = "/todo/create/";
        });

        /* +추가 페이지 크기 변경 시 1페이지부터 다시 로드 */
        document.getElementById("pageSizeBtn").addEventListener("click", () => {
            const val = parseInt(document.getElementById("pageSizeInput").value);
            if (val >= 1 && val <= 20) {
                currentPageSize = val;
                loadPage(1);
            } else {
                alert("1에서 20 사이의 숫자를 입력해주세요.");
            }
        });

        /* 페이지 최초 로딩 시 1페이지 데이터 요청 */
        loadPage(1);
    });
</script>
{% endblock %}
