{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="container">
  <h2>Create a New Todo</h2>
    <div>
      <label for="name">Name:</label>
      <input type="text" name="name" id="name">
    </div>

    <div>
      <label for="description">Description:</label>
      <textarea name="description" id="description">
      </textarea>
    </div>

    <div>
      <label for="complete">Complete:</label>
      <input type="checkbox" name="complete" id="complete">
    </div>

    <div>
      <label for="exp">Experience Points:</label>
      <input type="number" name="exp" id="exp" min="0">
    </div>

    <!--이미지 업로드 필드-->
    <div>
      <label for="image">Image:</label>
      <input type="file" id="image">
    </div>

    <button type="submit" id="todoCreate">생성</button>
    <button class="todoHome">홈으로</button>
</div>

<!-- axios: fetch보다 간편한 HTTP 요청 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="{% static 'todo/api.js' %}"></script>

<script>

  // 로그인 페이지 주소
  const LOGIN_PAGE_URL = "/login/";
  // Todo 생성 API 주소
  const CREATE_API_URL = "/todo/viewsets/view/";


  // 서버 응답을 받은 후 실행되는 코드
  api.interceptors.response.use(

    // 정상 응답이면 그대로 반환
    // 인터셉터는 성공/실패를 쌍으로 받는 구조라 작성해야함.
    (res) => res,

    // 에러 응답 처리
    async (err) => {

      const status = err.response?.status;

      // 인증 실패(401) 또는 권한 없음(403)이면 로그인 페이지로 이동
      if (status === 401 || status === 403) {
        console.log("세션 없음/권한 없음 → 로그인 이동");
        window.location.href = LOGIN_PAGE_URL;
        return Promise.reject(err);
      }

      return Promise.reject(err);
    }
  );

const homeBtn = document.querySelector(".todoHome");

homeBtn.addEventListener("click", () => {
    window.location.href = "{% url 'todo:list' %}";
  });


/* Todo 생성 버튼 클릭 이벤트 */
document.getElementById("todoCreate").addEventListener("click", async () => {
  try {
    // 파일 업로드를 포함한 데이터를 서버로 전송할 때 사용
    const formData = new FormData();

    // 입력된 Todo 데이터를 FormData에 추가
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("complete", document.getElementById("complete").checked);
    formData.append("exp", Number(document.getElementById("exp").value || 0));

    // 이미지 파일 input 요소 가져오기
    const fileInput = document.getElementById("image");

    // 파일이 선택되어 있으면 FormData에 이미지 추가
    if (fileInput.files.length > 0) {
      formData.append("image", fileInput.files[0]);
    }

    // Todo 생성 API 호출
    // JSON 대신 FormData 형태로 서버에 전송
    const res = await api.post("todo/viewsets/view/", formData);
    console.log(res.data);
    window.location.href = "/todo/list/";

  } catch (err) {

    // 에러 발생 시 콘솔에 출력
    console.error(err.response?.data || err.message);
  }
});
