{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container">
  <h2>Todo 수정</h2>

  <div>
    <label for="name">Name:</label>
    <input type="text" name="name" id="name" value="{{ todo.name }}">
  </div>

  <div>
    <label for="description">Description:</label>
    <textarea name="description" id="description">{{ todo.description }}</textarea>
  </div>

  <div>
    <label for="complete">Complete:</label>
    <input type="checkbox" name="complete" id="complete" {% if todo.complete %}checked{% endif %}>
  </div>

  <div>
    <label for="exp">Experience Points:</label>
    <input type="number" name="exp" id="exp" min="0" value="{{ todo.exp }}">
  </div>

  <!-- [Part 6] 현재 이미지 미리보기 -->
  <div>
    <label>Current Image:</label><br>
    {% if todo.image %}
      <img src="{{ todo.image.url }}" alt="todo image" style="max-width:250px; height:auto;">
    {% else %}
      <div class="no-image">이미지 없음</div>
    {% endif %}
  </div>

  <!-- [Part 6] 새 이미지 업로드 -->
  <div>
    <label for="image">New Image:</label>
    <input type="file" id="image">
  </div>

  <button type="button" id="todoUpdate">저장</button>
  <button type="button" onclick="history.back()">취소</button>
</div>

<!-- axios: fetch보다 간편한 HTTP 요청 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="{% static 'todo/api.js' %}"></script>
<script>


const todoId = "{{ todo.id }}";  // Django 템플릿에서 JS 변수로 전달

document.getElementById("todoUpdate").addEventListener("click", async () => {
  try {

    // FormData 객체 생성 파일 업로드나 multipart/form-data 요청을 보낼 때 사용
    const formData = new FormData();

    // 이미지 input 요소 가져오기
    const fileInput = document.getElementById("image");

    // 새 이미지를 선택했을 경우에만 image 필드를 추가
    if (fileInput.files.length > 0) {
      formData.append("image", fileInput.files[0]);
    }


    // PATCH: 일부 필드만 보내도 수정 가능 (PUT은 전체 필드 필요)
    //const res = await api.patch(`/todo/api/update/${todoId}/`, formData);

    // json 데이터 넘겨주는 방식
    // const res = await api.patch(`/todo/viewsets/view/${todoId}/`, {
    //   name: document.getElementById("name").value,
    //   description: document.getElementById("description").value,
    //   complete: document.getElementById("complete").checked,
    //   exp: Number(document.getElementById("exp").value || 0)
    // });

    // formData 방식으로 넘기기
    formData.append("name", document.getElementById("name").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("complete", document.getElementById("complete").checked);
    formData.append("exp", Number(document.getElementById("exp").value || 0));

    const res = await api.patch(`/todo/viewsets/view/${todoId}/`, formData);
    console.log(res.data);
    window.location.href = `/todo/detail/${todoId}/`;

  } catch (err) {
    console.error("status:", err.response?.status);
    console.error(err.response?.data || err.message);
    console.error("message:", err.message);
    alert("수정 실패");
  }
});
</script>

{% endblock %}
