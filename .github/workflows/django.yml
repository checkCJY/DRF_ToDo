# GitHub Actions 워크플로우 이름
name: Django CI

# 실행 트리거: main, develop, feature/* 브랜치에 push 또는 PR 발생 시 실행
on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop", "feature/*" ]

jobs:
  build:
    # GitHub에서 제공하는 Ubuntu 환경에서 실행
    runs-on: ubuntu-latest

    strategy:
      # 최대 4개 작업 동시 실행 가능
      max-parallel: 4
      matrix:
        # 테스트할 Python 버전
        python-version: ["3.12.3"]

    steps:
    # 1. 저장소 코드를 워크플로우 환경으로 가져오기
    - uses: actions/checkout@v4

    # 2. 지정한 Python 버전 설치 (v5: 캐싱 개선, 안정화 버전)
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. pip 업데이트 후 requirements.txt 패키지 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Django DB 마이그레이션 실행
    - name: Run Migrations
      run: |
        python manage.py migrate --noinput

    # 5. 디버깅용: 마이그레이션 상태 및 DB 설정 확인
    - name: Debug Info
      run: |
        python manage.py showmigrations todo
        python manage.py shell -c "from django.conf import settings; print('DATABASES =', settings.DATABASES)"

    # 6. pytest로 전체 테스트 실행
    - name: Run Tests
      run: |
        pytest
