name: Django CI

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop", "feature/*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # CI 환경변수 설정 (민감한 값은 Secrets, DB는 임시 환경이라 하드코딩)
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      POSTGRES_DB: mysite_db
      POSTGRES_USER: mysite_user
      POSTGRES_PASSWORD: mysite_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    # CI 환경에서 PostgreSQL 컨테이너 실행
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: mysite_db
          POSTGRES_USER: mysite_user
          POSTGRES_PASSWORD: mysite_password
        ports:
          - 5432:5432
        # 컨테이너가 완전히 준비될 때까지 대기
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12.3"]

    steps:
    # 1. 저장소 코드를 워크플로우 환경으로 가져오기
    - uses: actions/checkout@v4

    # 2. 지정한 Python 버전 설치
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. pip 업데이트 후 requirements.txt 패키지 설치
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Django DB 마이그레이션 실행
    - name: Run Migrations
      run: |
        python manage.py migrate --noinput

    # 5. 디버깅용: 마이그레이션 상태 및 DB 설정 확인
    - name: Debug Info
      run: |
        python manage.py showmigrations todo
        python manage.py shell -c "from django.conf import settings; print('DATABASES =', settings.DATABASES)"

    # 6. pytest로 전체 테스트 실행
    - name: Run Tests
      run: |
        pytest
